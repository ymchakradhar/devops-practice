apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-yaml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp-yaml
  template:
    metadata:
      labels:
        app: myapp-yaml
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80